<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduciendo Video - Goikorol</title>
    <link rel="icon" href="imagenes/logo.png" type="image/jpeg">
    <link rel="stylesheet" href="css/styles.css">
<body>

<header>
    <h1>Goikorol</h1>
</header>

<main>
    <div class="player-container">
        <div class="player-wrapper">
            <iframe id="video-player" allowfullscreen></iframe>
        </div>

        <div class="player-info">
            <h2 id="player-title"></h2>
            <p class="player-description"></p>
            <p class="player-date"></p>
        </div>
    </div>
</main>

<footer class="site-footer">
    <div class="footer-content">
        
        <div class="social-links">
            <a href="https://www.twitch.tv/goikorol" target="_blank" title="Twitch" class="social-link">
                <img src="imagenes/twitch.png" alt="Twitch">
            </a>
            <a href="https://www.youtube.com/@goikorol" target="_blank" title="YouTube" class="social-link">
                <img src="imagenes/youtube.png" alt="YouTube">
            </a>
            <a href="https://discord.gg/mWU9yc2CVj" target="_blank" title="Discord" class="social-link">
                <img src="imagenes/discord.png" alt="Discord">
            </a>
            <a href="https://www.instagram.com/goikorol" target="_blank" title="Instagram" class="social-link">
                <img src="imagenes/instagram.png" alt="Instagram">
            </a>
            <a href="https://www.facebook.com/goikorol" target="_blank" title="Facebook" class="social-link">
                <img src="imagenes/facebook.png" alt="Facebook">
            </a>
            <a href="https://ko-fi.com/goikorol" target="_blank" title="Donaciones" class="social-link donate">
                <img src="imagenes/paypal.png" alt="Donaciones">
            </a>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2025 Goikorol. Todos los derechos reservados.</p>
            <p>Hecho con mucho ❤️ para la comunidad mas careta!</p>
        </div>
    </div>
    </footer>

<script>
function getEmbedUrl(video) {
    if (video.platform === "youtube") {
        return `https://www.youtube.com/embed/${video.id}`;
    }

    if (video.platform === "rumble") {
        if (video.id.startsWith("http")) {
            return video.id;
        }
        return `https://rumble.com/embed/${video.id}`;
    }

    return null;
}

document.addEventListener("DOMContentLoaded", async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video");

    if (!videoId) return;

    const response = await fetch("data/videos.json");
    const videos = await response.json();

    const video = videos.find(v => v.id === videoId);
    if (!video) return;

    const player = document.getElementById("video-player");
    const embedUrl = getEmbedUrl(video);

    if (embedUrl) {
        player.src = embedUrl;
    }

    document.getElementById("player-title").textContent = video.title;
    document.querySelector(".player-description").textContent = video.description;
    document.querySelector(".player-date").textContent = `Publicado: ${video.date}`;
});
</script>

</body>
</html>
