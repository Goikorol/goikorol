<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Video - Goikorol</title>
    <link rel="icon" href="imagenes/logo.png" type="image/jpeg">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header id="dynamic-header"></header>

<main>
    <section id="add-video">
        <h2>Agregar Nuevo Video</h2>

        <form id="video-form">

            <!-- NUEVO: PLATAFORMA -->
            <label for="platform">Plataforma:</label>
            <select id="platform" required>
                <option value="youtube">YouTube</option>
                <option value="rumble">Rumble</option>
            </select>

            <label for="id">ID o URL del video:</label>
            <input type="text" id="id" required>

            <label for="title">Título:</label>
            <input type="text" id="title" required>

            <label for="description">Descripción:</label>
            <textarea id="description" required></textarea>

            <label for="date">Fecha (YYYY-MM-DD):</label>
            <input type="date" id="date" required>

            <label for="tags">Tags (separados por coma):</label>
            <input type="text" id="tags" placeholder="musica,reaccion,goiko">

            <p>Thumbnail: automático (YouTube) / placeholder (Rumble)</p>

            <label for="category">Sección:</label>
            <select id="category" required>
                <option value="">Seleccionar sección</option>
                <option value="goikorol">Goikorol</option>
                <option value="themoviesniper">The Movie Sniper</option>
                <option value="Goikorock">Goikorock</option>
                <option value="gameplays">Gameplays</option>
            </select>

            <label for="playlist">Playlist:</label>
            <input type="text" id="playlist" required>

            <button type="submit">Agregar Video</button>
            <button type="button" id="clear-form">Limpiar</button>
            <button type="button" id="download-json">Descargar JSON</button>
            <button type="button" id="copy-json">Copiar JSON</button>
        </form>

        <p id="status"></p>
    </section>

    <h3>JSON generado</h3>
    <textarea id="json-preview" rows="15" readonly
        style="width:100%; font-family: monospace;"></textarea>

</main>

<footer class="site-footer"></footer>

<script>
let videos = JSON.parse(localStorage.getItem('videos')) || [];

const form = document.getElementById('video-form');
const jsonPreview = document.getElementById('json-preview');
const status = document.getElementById('status');

// ===============================
// EXTRAER ID SEGÚN PLATAFORMA
// ===============================
function extractVideoID(input, platform) {

    if (platform === "youtube") {
        const regex = /(?:v=|youtu\.be\/|embed\/)([^?&]+)/;
        const match = input.match(regex);
        return match ? match[1] : input.trim();
    }

    if (platform === "rumble") {
        const regex = /rumble\.com\/(v[^\-\/]+)/;
        const match = input.match(regex);
        return match ? match[1] : input.trim();
    }

    return input.trim();
}

// ===============================
// THUMBNAIL
// ===============================
function getThumbnail(id, platform) {

    if (platform === "youtube") {
        return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    if (platform === "rumble") {
        return "imagenes/default-thumbnail.jpg"; // poné una imagen placeholder
    }

    return "";
}

// ===============================
// ACTUALIZAR JSON
// ===============================
function updatePreview() {
    jsonPreview.value = JSON.stringify(videos, null, 4);
    localStorage.setItem('videos', JSON.stringify(videos));
}

// Fecha actual
document.getElementById('date').value =
    new Date().toISOString().split('T')[0];

updatePreview();

// ===============================
// AGREGAR VIDEO
// ===============================
form.addEventListener('submit', (e) => {
    e.preventDefault();

    const rawInput = document.getElementById('id').value;
    const platform = document.getElementById('platform').value;

    const videoId = extractVideoID(rawInput, platform);

    const newVideo = {
        id: videoId,
        platform: platform,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        date: document.getElementById('date').value,
        tags: document.getElementById('tags').value
            .split(',')
            .map(t => t.trim())
            .filter(Boolean),
        thumbnail: getThumbnail(videoId, platform),
        category: document.getElementById('category').value,
        playlist: document.getElementById('playlist').value
    };

    if (videos.some(v => v.id === videoId)) {
        status.textContent = '⚠️ Este video ya existe.';
        return;
    }

    videos.push(newVideo);
    updatePreview();

    status.textContent = '✅ Video agregado.';
    form.reset();
});

// ===============================
// LIMPIAR TODO
// ===============================
document.getElementById('clear-form').addEventListener('click', () => {
    if (!confirm('⚠️ Se borrarán todos los videos. ¿Continuar?')) return;

    videos = [];
    localStorage.removeItem('videos');
    form.reset();
    jsonPreview.value = '[]';
    status.textContent = '🧹 Limpieza completa.';
});

// ===============================
// DESCARGAR JSON
// ===============================
document.getElementById('download-json').addEventListener('click', () => {
    const blob = new Blob(
        [JSON.stringify(videos, null, 4)],
        { type: 'application/json' }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'videos.json';
    a.click();

    URL.revokeObjectURL(url);
});

// ===============================
// COPIAR JSON
// ===============================
document.getElementById('copy-json').addEventListener('click', () => {
    navigator.clipboard.writeText(jsonPreview.value);
    status.textContent = '📋 Copiado al portapapeles.';
});

</script>

</body>
</html>
